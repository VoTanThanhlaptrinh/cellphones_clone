<div class="flex flex-col p-2 bg-white w-full gap-y-2 rounded-lg">
    <!-- ADD THIS WRAPPER -->
    <div [formGroup]="group">
        <div class="grid grid-cols-2 gap-x-4 px-4 z-12">
            <app-autocomplete-input [label]="'Tỉnh/thành phố'.toUpperCase()" [original]="cityList"
                formControlName="city" (dataChosen)="onCityChosen($event)" name="city"></app-autocomplete-input>
            <app-autocomplete-input [label]="'quận/huyện'.toUpperCase()" [original]="districtList"
                formControlName="district" (dataChosen)="onDistrictChosen($event)"
                name="district"></app-autocomplete-input>
        </div>
        <div class="w-full px-4">
            <app-autocomplete-input formControlName="streetName" name="streetName" [label]="'Chọn địa chỉ cửa hàng'"
                [original]="streetList" (dataChosen)="onStreetChosen($event)"></app-autocomplete-input>
        </div>
    </div> <!-- CLOSE WRAPPER -->
    <div class="w-full mx-auto px-4">
        <app-input formControlName="note" name="note" label="Ghi chú"></app-input>
    </div>

</div>
